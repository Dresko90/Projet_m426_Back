    MessageResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
        senderId:
          type: integer
          format: int64
        body:
          type: string
        sentAt:
          type: string
          format: date-time
        status:
          type: array
          items:
            type: object
            properties:
              userId:
                type: integer
                format: int64
              readAt:
                type: string
                format: date-time
              deleted:
                type: boolean
        _links:
          $ref: '#/components/schemas/HalLinks'
      example:
        id: 6001
        senderId: 1001
        body: "J'aurai un peu de retard. Commencez sans moi"
        sentAt: "2025-04-24T15:00:00Z"
        participantStatus:
          - userId: 1002
            readAt: null
            deleted: false
          - userId: 1003
            readAt: null
            deleted: false
        _links:
          self:
            href: /conversations/4005/message/6001

