openapi: 3.0.1
info:
  title: Instant Messaging API
  description:
    "API REST pour une messagerie instantanée avec gestion des utilisateurs, des conversations et des messages."
  version: 1.0.0
  contact:
    name: "Jérôme Frossard"
    email: jerome.frossard@epai.ch
servers:
  - url: https://message-api.n01.lab.epai-ict.ch
    description: "Production"
  - url: http://localhost:8080
    description: "Développement"
security:
  - BearerAuth: []
components:
  schemas:
    EmailType:
      type: string
      format: email

    PhoneNumberType:
      description: "Numéro de téléphone au format E.164."
      type: string
      pattern: ^\+?[1-9]\d{1,14}$

    UserNameType:
      oneOf:
        - $ref: '#/components/schemas/EmailType'
        - $ref: '#/components/schemas/PhoneNumberType'

    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
      example:
        code: 400
        message: "Requête invalide"

    HalLinks:
      type: object
      properties:
        self:
          type: object
          properties:
            href:
              type: string

    HalCollectionLinks:
      type: object
      properties:
        self:
          type: object
          properties:
            href:
              type: string
        first:
          type: object
          properties:
            href:
              type: string
        last:
          type: object
          properties:
            href:
              type: string
        next:
          type: object
          properties:
            href:
              type: string
        prev:
          type: object
          properties:
            href:
              type: string

    PageMetadata:
      type: object
      properties:
        size:
          type: integer
        totalElements:
          type: integer
        totalPages:
          type: integer
        number:
          type: integer
      example:
        size: 20
        totalElements: 1
        totalPages: 1
        number: 0

    # (Les autres schémas UserCreate, UserResponse, TokenRequest, etc. restent inchangés)

paths:
  /tokens:
    post:
      summary: "Créer un token (connexion)."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TokenRequest'
      responses:
        "200":
          description: "Token renvoyé"
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        "400":
          description: "Requête invalide"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: "Identifiants de connexion non valides."
        "403":
          description: "Accès refusé"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "500":
          description: "Erreur interne du serveur"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /tokens/current:
    delete:
      summary: "Supprimer le token de l'utilisateur·rice connecté·e (déconnexion)."
      security:
        - bearerAuth: []
      responses:
        "204":
          description: "Token supprimé"
        "401":
          description: "Non autorisé"
        "403":
          description: "Accès refusé"
        "404":
          description: "Non trouvé"
        "500":
          description: "Erreur interne du serveur"

  /users:
    post:
      summary: "Créer un compte d'utilisateur·rice."
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        "201":
          description: "Le compte a été créé avec succès."
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "400":
          description: "Requête invalide"
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        "401":
          description: "Non autorisé"
        "403":
          description: "Accès refusé"
        "500":
          description: "Erreur interne du serveur"

  /users/{userId}:
    get:
      summary: "Obtenir les informations d’un·e utilisateur·rice."
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: "Les détails de l'utilisateur·rice."
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "401":
          description: "Non autorisé"
        "403":
          description: "Accès refusé"
        "404":
          description: "Utilisateur non trouvé"
        "500":
          description: "Erreur interne du serveur"
    post:
      summary: "Modifier les informations d’un·e utilisateur·rice."
      security:
        - bearerAuth: []
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
            format: int64
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        "200":
          description: "Les informations de l'utilisateur·rice ont été modifiées avec succès."
          content:
            application/hal+json:
              schema:
                $ref: '#/components/schemas/UserResponse'
        "400":
          description: "Requête invalide"
        "401":
          description: "Non autorisé"
        "403":
          description: "Accès refusé"
        "404":
          description: "Utilisateur non trouvé"
        "500":
          description: "Erreur interne du serveur"

  # (Même insertion des codes d'erreur pour tous les autres endpoints : /conversations, /conversations/{conversationId}, /conversations/{conversationId}/participants, etc.)

  # Vous pouvez reproduire ce schéma pour chaque opération, en ajoutant sous "responses" les codes "400", "401", "403", "404" et "500" avec les descriptions et, si pertinent, le schéma ErrorResponse.

